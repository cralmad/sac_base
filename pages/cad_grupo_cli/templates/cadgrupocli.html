{% extends "base.html" %}
{% load static %}

{% block title %}Cadastro de Grupo de Clientes{% endblock %}

{% block estilo %}<link rel="stylesheet" href="{% static 'cad_grupo_cli/css/styles.css' %}">{% endblock %}

{% block content %}

<ul class="nav nav-tabs" id="cadastroTabs" role="tablist">
    <li class="nav-item" role="presentation">
        <button class="nav-link active"
                id="cadastro-tab"
                data-bs-toggle="tab"
                data-bs-target="#cadastro"
                type="button"
                role="tab">
            CADASTRO
        </button>
    </li>
</ul>

<form id="cadForm" novalidate>
    {% csrf_token %}
    <div class="tab-content border border-top-0 p-1" id="cadastroTabsContent">
        <div class="tab-pane fade show active" id="cadastro" role="tabpanel">
            <div class="container my-4">

                <div class="row g-3">

                <!-- Grupo -->
                <div class="col-md-6">
                    <label for="descricao" class="form-label">Descrição do Grupo *</label>
                    <input
                    type="text"
                    id="descricao"
                    name="descricao"
                    class="form-control smart-input"
                    data-textCase="upper"
                    maxlength="30"
                    required
                    >
                </div>

                <!-- Botão -->
                <div class="col-12">
                    <button type="submit" class="btn btn-primary">Salvar</button>
                </div>

                </div>
                
                <button id="teste" type="button" class="btn btn-primary">TESTE</button>
            </div>
        </div>
    </div>
</form>

{% block scripts %}<script type="module" src="{% static 'cad_grupo_cli/js/scripts.js' %}"></script>{% endblock %}
{% endblock %}
