{% extends "base.html" %}
{% load static %}

{% block title %}Conferência de Volumes{% endblock %}

{% block estilo %}
<link rel="stylesheet" href="{% static 'pedidos/css/styles.css' %}">
{% endblock %}

{% block content %}
<div id="relatorio-root" class="container-xl my-3"
     data-url-salvar="{% url 'relatorio_conferencia_salvar' %}"
     data-url-imprimir="{% url 'relatorio_conferencia_imprimir' %}">
  <h2 class="mb-3">Conferência de Volumes</h2>
  <form id="filtro-relatorio" class="row g-2 mb-3">
    <div class="col-6 col-md-3">
      <label class="form-label mb-0 d-flex align-items-center gap-1" for="filtro-data">
        <span>Data de Entrega *</span>
        <span
          class="text-primary"
          role="button"
          tabindex="0"
          data-bs-toggle="tooltip"
          data-bs-placement="top"
          data-bs-title="Filtra as tentativas de entrega pela data planejada.">
          <i class="bi bi-question-circle"></i>
        </span>
      </label>
      <input type="date" id="filtro-data" name="data_tentativa" class="form-control" required>
    </div>
    <div class="col-6 col-md-3">
      <label class="form-label mb-0" for="filtro-referencia">Referência</label>
      <input type="text" id="filtro-referencia" name="referencia" class="form-control" maxlength="100" placeholder="Buscar por referência">
    </div>
    <div class="col-6 col-md-2">
      <label class="form-label mb-0" for="filtro-tipo">Tipo</label>
      <select id="filtro-tipo" name="tipo" class="form-select">
        <option value="">Todos</option>
        <option value="ENTREGA">Entrega</option>
        <option value="RECOLHA">Recolha</option>
      </select>
    </div>
    <div class="col-6 col-md-2">
      <label class="form-label mb-0 d-flex align-items-center gap-1" for="filtro-conferido">
        <span>Conferido</span>
        <span
          class="text-primary"
          role="button"
          tabindex="0"
          data-bs-toggle="tooltip"
          data-bs-placement="top"
          data-bs-title="Filtra por registros onde Volume e Volume Conf. s&atilde;o iguais (Sim) ou diferentes (N&atilde;o).">
          <i class="bi bi-question-circle"></i>
        </span>
      </label>
      <select id="filtro-conferido" name="conferido" class="form-select">
        <option value="">Todos</option>
        <option value="sim">Sim</option>
        <option value="nao">N&atilde;o</option>
      </select>
    </div>
    <div class="col-12 col-md-2 d-flex align-items-end">
      <button type="submit" class="btn btn-primary w-100">
        <i class="bi bi-search"></i> Buscar
      </button>
    </div>
    <div class="col-12 col-md-2 d-flex align-items-end">
      <button type="button" id="btn-imprimir-relatorio" class="btn btn-outline-secondary w-100" disabled>
        <i class="bi bi-printer"></i> Relatório
      </button>
    </div>
  </form>
  <div id="mov-lista" class="row g-3"></div>
  <div id="loader" class="text-center my-3 d-none">
    <div class="spinner-border" role="status">
      <span class="visually-hidden">Carregando...</span>
    </div>
  </div>
  <div id="fim-lista" class="text-center text-muted d-none">Fim da lista</div>
</div>
{% endblock %}

{% block scripts %}
<script type="module" src="{% static 'js/relatorio_conferencia.js' %}"></script>
{% endblock %}
