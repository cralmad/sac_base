{% extends "base.html" %}
{% load static %}

{% block title %}Rotas por Carro{% endblock %}

{% block estilo %}
<style>
/* ── Ecrã ── */
.rr-filtros      { background: #f8f9fa; border-radius: .5rem; padding: 1rem; }
.rr-grupo        { margin-bottom: 1.5rem; }
.rr-grupo-header {
  background: #1a3a5c;
  color: #fff;
  padding: .35rem .75rem;
  border-radius: .375rem .375rem 0 0;
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: .5rem 1rem;
  font-weight: 600;
  font-size: .95rem;
}
.rr-grupo-header .rr-badge {
  background: rgba(255,255,255,.2);
  border-radius: .25rem;
  padding: .1rem .45rem;
  font-size: .8rem;
}
.rr-tabela-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
table.rr-tabela  { width: 100%; border-collapse: collapse; font-size: 9pt; min-width: 700px; }
table.rr-tabela th {
  background: #e9f0f7;
  color: #1a3a5c;
  border: 1px solid #c8d8e8;
  padding: .3rem .5rem;
  white-space: nowrap;
}
table.rr-tabela td {
  border: 1px solid #dee2e6;
  padding: .28rem .5rem;
  vertical-align: top;
}
.rr-tipo-e { color: #0a6640; font-weight: 700; }
.rr-tipo-r { color: #7c2020; font-weight: 700; }
.rr-obs    { color: #555; font-size: .78rem; font-style: italic; }
.rr-periodo-MANHA { color: #b55a00; font-weight: 600; }
.rr-periodo-TARDE { color: #0055a5; font-weight: 600; }
.rr-dev-sim {
  color: #842029;
  font-weight: 700;
  text-align: center;
  font-size: 1.2rem;
  line-height: 1;
}
table.rr-tabela tr.rr-nao-segue td { background: #e0e0e0 !important; }

/* ── Multi-select de motoristas ── */
#rr-motoristas {
  min-height: 6rem;
  font-size: .875rem;
  width: 100%;
  max-width: 100%;
  overflow-x: hidden;
  box-sizing: border-box;
}
.rr-select-actions { display: flex; gap: .25rem; margin-top: .25rem; }
.rr-select-actions button { font-size: .75rem; padding: .1rem .4rem; }
@media print {
  @page { size: A4 landscape; margin: 6mm 8mm; }
  body, .container-xl, .container-fluid { padding: 0 !important; margin: 0 !important; }
  .rr-filtros, #rr-toolbar, .navbar, .sidebar, footer,
  [data-bs-toggle], .btn, #container-mensagens { display: none !important; }
  .rr-grupo {
    margin-bottom: .25rem;
    break-inside: avoid-page;
    page-break-inside: avoid;
  }
  .rr-grupo-header {
    background: #1a3a5c !important;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
    color: #fff !important;
    padding: .1rem .4rem;
    font-size: 8pt;
  }
  .rr-tabela-scroll { overflow: visible; }
  table.rr-tabela  { font-size: 8pt; min-width: 0; }
  table.rr-tabela th { background: #dce6f1 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; padding: .1rem .25rem; }
  table.rr-tabela td { padding: .08rem .25rem; vertical-align: middle; }
  table.rr-tabela tr.rr-nao-segue td { background: #d6d6d6 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .rr-tipo-e, .rr-tipo-r { font-weight: 700; }
  h1 { font-size: .85rem !important; margin-bottom: .15rem !important; }
  #rr-titulo-data { font-size: 7.5pt; }
}
</style>
{% endblock %}

{% block content %}
<div class="container-xl my-3" id="rr-root"
     data-url-buscar="{% url 'relatorio_rotas' %}"
     data-url-link="{% url 'mapa_publico_gerar_link' %}">

  <div class="d-flex align-items-center justify-content-between flex-wrap gap-2 mb-3">
    <h1 class="h4 mb-0"><i class="bi bi-truck me-2"></i>Rotas por <span id="rr-titulo-agrup">Carro</span></h1>
    <span id="rr-titulo-data" class="text-muted small"></span>
  </div>

  <!-- Filtros -->
  <div class="rr-filtros mb-3" id="rr-toolbar">
    <form id="rr-form" class="row g-2 align-items-end">
      <div class="col-6 col-md-3">
        <label class="form-label mb-0 d-flex align-items-center gap-1" for="rr-data">
          <span>Data *</span>
          <span class="text-primary" role="button" tabindex="0"
            data-bs-toggle="tooltip" data-bs-placement="top"
            data-bs-title="Data da tentativa de entrega (obrigatório).">
            <i class="bi bi-question-circle"></i>
          </span>
        </label>
        <input type="date" id="rr-data" class="form-control" required>
      </div>
      <div class="col-6 col-md-2">
        <label class="form-label mb-0 d-flex align-items-center gap-1" for="rr-carro">
          <span>Carro</span>
          <span class="text-primary" role="button" tabindex="0"
            data-bs-toggle="tooltip" data-bs-placement="top"
            data-bs-title="Filtre por número(s) de carro. Ex: 1,3,5-10">
            <i class="bi bi-question-circle"></i>
          </span>
        </label>
        <input type="text" id="rr-carro" class="form-control font-monospace" placeholder="ex: 1,3,5-10">
        <div id="rr-carro-erro" class="text-danger small d-none">Sintaxe inválida. Use: 1,3,5-10,11</div>
      </div>
      <div class="col-6 col-md-2">
        <label class="form-label mb-0" for="rr-agrupamento">Agrupar por</label>
        <select id="rr-agrupamento" class="form-select">
          <option value="carro" selected>Carro</option>
          <option value="motorista">Motorista</option>
        </select>
      </div>
      <div class="col-12 col-md-3">
        <label class="form-label mb-0 d-flex align-items-center gap-1" for="rr-motoristas">
          <span>Motorista</span>
          <span class="text-primary" role="button" tabindex="0"
            data-bs-toggle="tooltip" data-bs-placement="top"
            data-bs-title="Selecione um ou mais motoristas. Use Ctrl (ou Cmd) para múltiplos. Nenhum selecionado = todos.">
            <i class="bi bi-question-circle"></i>
          </span>
        </label>
        <select id="rr-motoristas" class="form-select" multiple></select>
        <div class="rr-select-actions">
          <button type="button" class="btn btn-outline-secondary" id="rr-btn-sel-todos">Todos</button>
          <button type="button" class="btn btn-outline-secondary" id="rr-btn-des-todos">Limpar</button>
        </div>
      </div>
      <div class="col-12 col-md-2 d-flex gap-2">
        <button type="submit" class="btn btn-primary w-100">
          <i class="bi bi-search"></i> Buscar
        </button>
        <button type="button" id="rr-btn-imprimir" class="btn btn-outline-secondary w-100" disabled>
          <i class="bi bi-printer"></i>
        </button>
      </div>
    </form>
  </div>

  <!-- Resultado -->
  <div id="rr-resultado"></div>

  <div id="rr-loader" class="text-center my-4 d-none">
    <div class="spinner-border" role="status">
      <span class="visually-hidden">Carregando…</span>
    </div>
  </div>

  <div id="rr-vazio" class="text-center text-muted d-none">Nenhum registro encontrado.</div>
</div>
{% endblock %}

{% block scripts %}
<script type="module" src="{% static 'pedidos/js/relatorio_rotas.js' %}"></script>
{% endblock %}
