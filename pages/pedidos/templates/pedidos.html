{% extends "base.html" %}
{% load static %}

{% block title %}SacBase - Importação de Pedidos{% endblock %}

{% block page_title %}Importação de Pedidos{% endblock %}

{% block content %}
  <div class="container-xl my-3 mx-auto container-form-importacao">
    <div class="card shadow-sm">
      <div class="card-header bg-primary text-white">
        <i class="bi bi-upload"></i> Importar CSV VONZU
      </div>
      <div class="card-body">
        <form id="formImportacao" enctype="multipart/form-data" novalidate>
          <div class="row g-3">
            <div class="col-12 col-md-6">
              <label class="form-label mb-0" for="filial_id">Matriz/Filial</label>
              <select name="filial_id" id="filial_id" class="form-select" required>
                <option value="">Selecione</option>
              </select>
            </div>
            <div class="col-12 col-md-6">
              <label class="form-label mb-0" for="arquivo_csv">Arquivo CSV</label>
              <input
                type="file"
                id="arquivo_csv"
                name="arquivo_csv"
                class="form-control"
                accept=".csv"
                required
              >
            </div>
          </div>

          <div class="row g-3 mt-1">
            <div class="col-12">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="verificar_volumes" name="verificar_volumes">
                <label class="form-check-label d-flex align-items-center gap-1" for="verificar_volumes">
                  <span>Verificar Volumes</span>
                  <span
                    class="text-primary"
                    role="button"
                    tabindex="0"
                    data-bs-toggle="tooltip"
                    data-bs-placement="top"
                    data-bs-title="Quando marcado, gera um relatório com os artigos de cada pedido (Referência, Peso, Volume e Artigos) após a importação.">
                    <i class="bi bi-question-circle"></i>
                  </span>
                </label>
              </div>
            </div>
          </div>

          <div class="mt-3 d-flex gap-2">
            <button
              type="submit"
              id="btn-importar"
              class="btn btn-primary"
              data-loader="true"
            >
              <i class="bi bi-cloud-upload"></i> Importar
            </button>
            <button
              type="button"
              id="btn-baixar-relatorio"
              class="btn btn-outline-success d-none"
            >
              <i class="bi bi-file-earmark-text"></i> Baixar Relatório
            </button>
          </div>
        </form>

        <div id="resultado-importacao" class="mt-3 d-none">
          <hr>
          <h6 class="text-muted">Resultado da Importação</h6>
          <div class="table-responsive">
            <table class="table table-sm table-bordered">
              <tbody id="tabela-stats"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
{% endblock %}

{% block scripts %}
  <script type="module" src="{% static 'pedidos/js/pedidos.js' %}"></script>
{% endblock %}
