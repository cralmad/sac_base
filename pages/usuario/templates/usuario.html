{% extends "base.html" %}
{% load static %}

{% block title %}SacBase - Usuario{% endblock %}

<link rel="stylesheet" href="{% static 'usuario/css/stylesuser.css' %}">
{% block page_title %}Cadastro de Usuário{% endblock %}
{% block content %}

<form id="cadUsuario" data-form-lock="cadUsuario" method="POST">
    {% csrf_token %}
    <div class="container-md-3 my-3 mx-auto">
        <div class="row g-3"> 
            
            <div class="col-12 col-sm-5">
                <label class="form-label mb-0">Nome</label>
                <input type="text" name="first_name" class="form-control smart-input"
                    data-deny="&quot;&apos;" data-textcase="upper" maxlength="30" minlength="3" required/>
            </div>

            <div class="col-12 col-sm-5">
                <label class="form-label mb-0">Usuário</label>
                <input type="text" name="username" class="form-control smart-input"
                    data-deny="&quot;&apos; " maxlength="20" minlength="3" required/>
            </div>

            <div class="col-12 col-sm-10">
                <label class="form-label mb-0">E-mail</label>
                <input type="email" name="email" class="form-control smart-input"
                    data-deny="&quot;&apos; " maxlength="60" required/>
            </div>

            <div class="col-12 col-sm-5">
                <label class="form-label mb-0">Senha</label>
                <input type="password" name="password" class="form-control smart-input"
                    data-deny="&quot;&apos; " maxlength="20" minlength="8" required/>
            </div>

            <div class="col-12 col-sm-5">
                <label class="form-label mb-0">Confirmar Senha</label>
                <input type="password" name="confirmpass" class="form-control smart-input"
                    data-deny="&quot;&apos; " maxlength="20" minlength="8" required/>
            </div>

            <div class="col-12 form-check form-switch ms-3">
                <input class="form-check-input smart-input" type="checkbox" name="ativo" id="flexCheckDefault">
                <label class="form-check-label mb-0" for="flexCheckDefault">Usuário Ativo</label>
            </div>
        </div>
    </div>
    
    <button id="btn-salvar" class="btn btn-primary" data-show-on="novo,editar" type="submit">
        <i class="bi bi-save"></i> Salvar
    </button>
    <button id="btn-editar" type="button" data-show-on="visualizar" class="btn btn-warning d-none">
        <i class="bi bi-pencil"></i> Editar
    </button>
    <button id="btn-novo" type="button" data-show-on="visualizar" class="btn btn-success d-none">
        <i class="bi bi-plus-circle"></i> Novo
    </button>
    <!-- Cancelar: visível em 'novo' e 'editar' — reinicia o formulário sem salvar -->
    <button id="btn-cancelar" type="button" data-show-on="novo,editar" class="btn btn-outline-secondary d-none">
        <i class="bi bi-x-circle"></i> Cancelar
    </button>
    <button type="button" id="btn-abrir-pesquisa" class="btn btn-secondary">
        <i class="bi bi-search"></i> Pesquisar
    </button>
</form>

<div id="div-pesquisa" class="container d-none">
    <div class="card shadow-sm">
        <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
            <span>Consultar Usuários</span>
            <button type="button" id="btn-fechar" class="btn-close btn-close-white"></button>
        </div>
        <div class="card-body">
            <form id="consUsuario" method="POST">
                <div class="container-md-3 my-3 mx-auto">
                    <div class="row g-3"> 
                        <div class="col-12 col-sm-5">
                            <label class="form-label mb-0">Nome</label>
                            <input type="text" name="first_name_cons" class="form-control smart-input"
                                data-deny="&quot;&apos;" data-textcase="upper" maxlength="30"/>
                        </div>

                        <div class="col-12 col-sm-5">
                            <label class="form-label mb-0">Usuário</label>
                            <input type="text" name="username_cons" class="form-control smart-input"
                                data-deny="&quot;&apos; " maxlength="20"/>
                        </div>

                        <div class="col-12 col-sm-10">
                            <label class="form-label mb-0">E-mail</label>
                            <input type="email" name="email_cons" class="form-control smart-input"
                                data-deny="&quot;&apos; " maxlength="60"/>
                        </div>

                        <div class="col-12 form-check form-switch ms-3">
                            <input class="form-check-input smart-input" type="checkbox" name="ativo_cons" id="flexCheckDefault">
                            <label class="form-check-label mb-0" for="flexCheckDefault">Usuário Ativo</label>
                        </div>

                        <div class="col-md-2 d-grid gap-2 d-md-flex">
                            <button type="submit" class="btn btn-success show-loader">Filtrar</button>
                            <button type="button" class="btn btn-outline-danger" id="btn-voltar">Voltar</button>
                        </div>
                    </div>
                </div>
            </form>

            <div class="table-responsive mt-4">
                <table class="table table-hover table-sm border">
                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>Nome</th>
                            <th>Usuário</th>
                            <th>E-mail</th>
                            <th>Ativo</th>
                            <th class="text-center">Ação</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-corpo">
                        </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

{% endblock %}

{% block scripts %}
  <script type="module" src="{% static 'usuario/js/scriptsuser.js' %}"></script>
{% endblock %}
