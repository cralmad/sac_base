{% extends "base.html" %}
{% load static %}

{% block title %}SacBase - Usuario{% endblock %}

<link rel="stylesheet" href="{% static 'usuario/css/stylesuser.css' %}">
{% block page_title %}Cadastro de Usuário{% endblock %}
{% block content %}

<form id="cadUsuario" method="POST">
    {% csrf_token %}

    <div class="mb-3">
        <label class="form-label">Nome</label>
        <input type="text" name="nome" class="form-control smart-input"
               data-allow="A-Za-z0-9" maxlength="20" required/>
    </div>

    <div class="mb-3">
        <label class="form-label">E-mail</label>
        <input type="password" name="email" class="form-control smart-input"
               data-allow="A-Za-z0-9@_-" maxlength="60" required/>
    </div>

    <div class="mb-3">
        <label class="form-label">Usuário</label>
        <input type="text" name="usuario" class="form-control smart-input"
               data-allow="A-Za-z0-9" maxlength="20" required/>
    </div>

    <div class="mb-3">
        <label class="form-label">Senha</label>
        <input type="password" name="nova_senha" class="form-control smart-input"
               data-deny="&quot;&apos;" maxlength="20" required/>
    </div>

    <div class="mb-3">
        <label class="form-label">Confirmar Senha</label>
        <input type="password" name="confirmar_senha" class="form-control smart-input"
               data-deny="&quot;&apos;" maxlength="20" required/>
    </div>

    <button class="btn btn-primary show-loader" type="submit">SALVAR</button>
</form>

{% endblock %}

{% block scripts %}
  <script type="module" src="{% static 'usuario/js/scriptsuser.js' %}"></script>
{% endblock %}
