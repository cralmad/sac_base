{% load static %}

<!DOCTYPE html>

<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title>{% block title %}{% endblock %}</title>

        <!-- Bootstrap CSS -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

        <!-- CSS global -->
        <link rel="stylesheet" href="{% static '/css/styles.css' %}">
        
        {{ sisVar|json_script:"sisDados" }}
    </head>

    <body class="bg-light">
        <nav id="navbase" class="navbar navbar-expand-lg navbar-dark bg-dark">
            <div class="container-fluid">
                <a class="navbar-brand" href="/">SacBase</a>
            </div>
        </nav>

        <div class="container-fluid">
            <div class="row">

                <!-- Sidebar -->
                <aside class="col-md-2 d-none d-md-block bg-white border-end min-vh-100">
                    <div class="p-3">
                        <h6 class="text-muted">Menu</h6>
                        <ul class="nav flex-column">
                            <li class="nav-item"><a class="nav-link" href="/">Dashboard</a></li>
                            <li class="nav-item"><a class="nav-link" href="/rel/">Relatórios</a></li>
                        </ul>
                    </div>
                </aside>

                <!-- Conteúdo -->
                <main class="col-md-10 ms-sm-auto px-4 py-4">

                    <!-- Mensagens ao Usuário -->
                    <div id="container-mensagens" class="mt-3"></div>
                    
                    <!-- O span#page-title-suffix é preenchido por JS quando necessário (ex: modo edição) -->
                    <h1 class="mb-4">{% block page_title %}{% endblock %}<span id="page-title-suffix"></span></h1>
                    {% block content %}{% endblock %}

                    <button id="teste" type="button" class="btn btn-primary">TESTE</button>
                    
                </main>
            </div>
        </div>

        <footer class="text-center py-3 bg-white border-top">
            <small>&copy; {% now "Y" %} - SaBase</small>
        </footer>

        <!-- Modal de Confirmação Global -->
        <!-- Controlado por sisVar.confirmar() — reutilizável em qualquer página -->
        <div class="modal fade" id="modal-confirmacao" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="modal-confirmacao-titulo"></h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body" id="modal-confirmacao-mensagem"></div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                            <i class="bi bi-x-circle"></i> Não
                        </button>
                        <button type="button" class="btn btn-primary" id="modal-confirmacao-btn-sim">
                            <i class="bi bi-check-circle"></i> Sim
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bootstrap JS -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

        <!-- JS global -->
        <script type="module" src="{% static 'js/base.js' %}"></script>
       {% block scripts %}{% endblock %}

    </body>

    <div id="global-loader" class="d-none fade-in">
        <div class="spinner-border text-light" style="width: 3rem; height: 3rem;" role="status">
            <span class="visually-hidden">Carregando...</span>
        </div>
    </div>
</html>
